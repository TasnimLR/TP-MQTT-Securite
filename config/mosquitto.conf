# Configuration Mosquitto - TP Sécurisation MQTT

# 1. Paramètres de base
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

# 2. Authentification
# Désactiver les connexions anonymes
allow_anonymous false
# Fichier contenant les mots de passe (généré par mosquitto_passwd)
password_file /mosquitto/config/passwd

# 3. Contrôle d'accès (ACL)
acl_file /mosquitto/config/acl

# 4. Listeners
# Listener par défaut (non sécurisé, port 1883)
listener 1883
# Listener sécurisé (TLS, port 8883)
listener 8883
cafile /mosquitto/config/certs/server.crt
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key
# Exiger un certificat client (mTLS)
require_certificate true
